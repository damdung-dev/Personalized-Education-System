{% extends 'base.html' %}
{% block title %}Tài khoản{% endblock %}

{% block content %}
<style>
  .profile-container {
    max-width: 700px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    padding: 32px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f6f8fa;
    margin: 0px auto 0 auto; /* Thêm margin-top: 32px để tránh bị dính topbar */
  }


  .profile-container h2 {
    font-size: 28.8px;
    font-weight: 600;
    margin-bottom: 24px;
    color: #1d1d1f;
  }

  .profile-container .form-group {
    margin-bottom: 19.2px;
  }

  .profile-container label {
    display: block;
    margin-bottom: 8px;
    font-size: 15.2px;
    color: #3c3c43;
  }

  .profile-container input[type="text"],
  .profile-container input[type="email"],
  .profile-container input[type="date"],
  .profile-container select {
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d1d6;
    border-radius: 12px;
    font-size: 16px;
    background-color: #f9f9f9;
  }

  .profile-container input:disabled {
    background-color: #f0f0f5;
    color: #888;
  }

  .profile-container .sub-note {
    font-size: 13.6px;
    color: #6e6e73;
    margin-top: 3.2px;
  }

  .profile-container .required {
    color: red;
    margin-right: 4.8px;
  }

  .profile-container .submit-btn {
    margin-top: 32px;
    background-color: #0071e3;
    color: #fff;
    padding: 12.8px 24px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }

  .profile-container .submit-btn:hover {
    background-color: #005bb5;
  }
</style>

<div class="profile-container">
  <h2>Thông tin tài khoản</h2>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label for="name">Tên</label>
      <input type="text" id="name" value="dung" disabled>
      <div class="sub-note">Đây là tên hệ thống của bạn.</div>
    </div>

    <div class="form-group">
      <label for="username">Tên tài khoản</label>
      <input type="text" id="username" value="dungdam290" disabled>
    </div>

    <div class="form-group">
      <label for="student_id">Mã Sinh viên</label>
      <input type="text" id="student_id" value="17376450302" disabled>
    </div>

    <div class="form-group">
      <label for="account_type">Loại tài khoản</label>
      <select id="account_type" disabled>
        <option selected>Cá nhân</option>
      </select>
    </div>

    <div class="form-group">
      <label for="phone"><span class="required">*</span>Số điện thoại</label>
      <input type="text" id="phone" value="+84 374869954">
    </div>

    <div class="form-group">
      <label for="email"><span class="required">*</span>Email liên hệ</label>
      <input type="email" id="email" value="damdungtienganh@gmail.com">
    </div>

    <div class="form-group">
      <label for="dob">Ngày sinh</label>
      <input type="date" id="dob" value="2001-09-22">
    </div>

    <div class="form-group">
      <label for="career">Nghề nghiệp</label>
      <select id="career">
        <option>Sinh viên</option>
        <option>Giáo viên</option>
        <option selected>Khác</option>
      </select>
    </div>

    <div class="form-group">
      <label for="other">Cụ thể</label>
      <input type="text" id="other" value="nhân viên toàn thời gian">
    </div>

    <button type="submit" class="submit-btn">Cập nhật thông tin</button>
  </form>
</div>
{% endblock %}
